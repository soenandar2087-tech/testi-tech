<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sawit AI v2.8 Final Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        :root { --accent: #1a73e8; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            height: 100%; width: 100%; background: var(--bg); 
            overflow: hidden; font-family: sans-serif;
            position: fixed;
        }

        .app-container {
            height: 100dvh; width: 100%;
            display: flex; flex-direction: column;
        }

        .top-bar {
            width: 100%; padding: 15px 20px; display: flex; 
            justify-content: space-between; align-items: center; 
            background: #000; z-index: 10;
        }

        /* Area ini sekarang akan dipaksa penuh */
        #webcam-container { 
            flex: 1; 
            width: 100%;
            position: relative;
            background: #000;
            overflow: hidden;
        }
        
        /* Video akan ditarik paksa memenuhi sisa layar */
        video, canvas { 
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%; 
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover !important; 
        }

        .bottom-panel {
            width: 100%; padding: 20px 10px 30px 10px;
            display: flex; flex-direction: column; 
            align-items: center; gap: 15px; background: #000;
            z-index: 10;
        }

        .label-status { 
            width: 90%; max-width: 320px; padding: 12px; border-radius: 8px;
            font-size: 14px; font-weight: bold; text-align: center;
            background: #222; border: 1px solid #333; color: white;
        }
        .label-mentah { background: #641515; border-color: #f44336; color: #ffcdd2; }
        .label-matang { background: #1b3d1d; border-color: #4caf50; color: #c8e6c9; }

        .btn-capture { 
            width: 75px; height: 75px; background: white; border: 6px solid #333;
            border-radius: 50%; cursor: pointer;
        }

        #preview-overlay {
            display: none; position: fixed; inset: 0; background: #000; z-index: 100;
            flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        #preview-canvas { width: 100%; max-width: 350px; border-radius: 8px; }
        .preview-btns { margin-top: 20px; display: flex; gap: 10px; width: 100%; max-width: 350px; }
        .btn-p { flex: 1; padding: 15px; border-radius: 8px; border: none; font-weight: bold; color: white; }

        #welcome-screen {
            position: fixed; inset: 0; background: white; z-index: 200;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="welcome-screen">
    <h2 style="color:#333; margin-bottom:20px;">🌴 Sawit AI</h2>
    <button onclick="startApp()" style="padding:15px 40px; background:var(--accent); color:white; border:none; border-radius:30px; font-weight:bold;">MULAI</button>
</div>

<div class="app-container">
    <div class="top-bar">
        <span style="font-weight: bold; font-size: 12px; color: #888;">SCANNER v2.8</span>
        <button onclick="location.reload()" style="background:none; border:none; color:#888;">Reset</button>
    </div>

    <div id="webcam-container"></div>

    <div class="bottom-panel">
        <div id="label-container" class="label-status">Menunggu Kamera...</div>
        <button class="btn-capture" onclick="captureImage()"></button>
        <p style="font-size: 10px; color: #444;">Posisikan buah di tengah layar</p>
    </div>
</div>

<div id="preview-overlay">
    <canvas id="preview-canvas"></canvas>
    <div class="preview-btns">
        <button class="btn-p" onclick="closePreview()" style="background:#333;">ULANGI</button>
        <button class="btn-p" onclick="saveImage()" style="background:var(--accent);">SIMPAN</button>
    </div>
</div>

<script>
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/ZkvJoTy22/";
    let model, webcam, labelContainer, isPaused = false;

    async function startApp() {
        document.getElementById('welcome-screen').style.display = 'none';
        labelContainer = document.getElementById("label-container");
        try {
            model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
            
            // Perbaikan Utama: Mengambil tinggi layar HP yang sebenarnya untuk kamera
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            webcam = new tmImage.Webcam(w, h, false); 
            await webcam.setup({ facingMode: "environment" }); 
            await webcam.play();
            
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            runAI();
        } catch (e) { alert("Gagal: " + e); }
    }

    async function runAI() {
        if (!isPaused) {
            webcam.update();
            await predict();
            requestAnimationFrame(runAI);
        }
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        prediction.sort((a, b) => b.probability - a.probability);
        const res = prediction[0];

        if (res.probability > 0.7) {
            labelContainer.innerHTML = `${res.className.toUpperCase()} (${(res.probability * 100).toFixed(0)}%)`;
            const label = res.className.toLowerCase();
            if (label.includes("mentah")) labelContainer.className = "label-status label-mentah";
            else if (label.includes("matang") || label.includes("masak")) labelContainer.className = "label-status label-matang";
        } else {
            labelContainer.innerHTML = "🔍 MENCARI OBJEK...";
            labelContainer.className = "label-status";
        }
    }

    function captureImage() {
        isPaused = true;
        const canvas = document.getElementById("preview-canvas");
        const ctx = canvas.getContext("2d");
        
        canvas.width = webcam.canvas.width;
        canvas.height = webcam.canvas.height;
        ctx.drawImage(webcam.canvas, 0, 0);
        
        const now = new Date();
        const tgl = now.toLocaleDateString('id-ID'); 
        const jam = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        
        const h_box = 60; 
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, canvas.height - h_box, canvas.width, h_box);
        
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.font = "bold 16px sans-serif";
        ctx.fillText(labelContainer.innerText, canvas.width/2, canvas.height - 35);
        ctx.font = "normal 12px sans-serif";
        ctx.fillStyle = "#ccc"; 
        ctx.fillText(`${tgl} | ${jam}`, canvas.width/2, canvas.height - 15);

        document.getElementById("preview-overlay").style.display = "flex";
    }

    function closePreview() {
        document.getElementById("preview-overlay").style.display = "none";
        isPaused = false;
        runAI();
    }

    function saveImage() {
        const link = document.createElement('a');
        link.download = `Sawit_${Date.now()}.png`;
        link.href = document.getElementById("preview-canvas").toDataURL("image/png");
        link.click();
    }
</script>
</body>
</html>
