<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sortasi Sawit AI - Fix Area Kamera</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        /* Pengaturan Dasar */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #000; /* Latar belakang hitam pekat */
            color: #fff;
            height: 100vh;
            overflow: hidden; /* Mencegah scroll pada body utama */
            display: flex;
            justify-content: center;
        }

        /* Container utama: Tata letak seperti Gambar 1 */
        .app-container {
            width: 100%;
            max-width: 500px; /* Batasan untuk tablet, full di HP */
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: #0c0c0c; /* Latar belakang container sedikit lebih terang */
        }

        /* PERBAIKAN DI SINI: Kontainer Kamera yang Diperbaiki */
        #webcam-container { 
            /* Ruang kamera dipertahankan seperti Gambar 1 */
            flex: 1; 
            min-height: 60%; 
            background: #000; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
        }
        
        /* Memastikan canvas webcam memenuhi kontainer secara portrait */
        #webcam-container canvas {
            height: 100% !important;
            width: auto !important;
            /* Jika rasio HP sangat tinggi, bagian samping mungkin terpotong, 
               tapi objek tengah tetap fokus */
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        /* UI Controls di Bagian Bawah (Tetap seperti Gambar 1) */
        .controls-panel {
            background-color: #0c0c0c;
            padding: 30px 20px 40px; /* Jarak yang luas untuk area tombol */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            border-top: 1px solid #1a1a1a;
        }

        .label-box { 
            width: 100%;
            max-width: 350px;
            padding: 15px; 
            border-radius: 12px; 
            font-size: 1.2em; 
            font-weight: bold; 
            text-align: center;
            min-height: 55px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-transform: uppercase;
        }
        .label-default { background-color: #2a2a2a; color: #bbb; border: 2px dashed #444; }
        .label-mentah { background-color: #852020; color: #ffcccc; border: 2px solid #d32f2f; }
        .label-matang { background-color: #1b5e20; color: #c8e6c9; border: 2px solid #2e7d32; }

        .btn-capture { 
            width: 70px; 
            height: 70px; 
            background-color: #fff; 
            border: 5px solid #fff; 
            border-radius: 50%; 
            cursor: pointer; 
            box-shadow: 0 0 0 4px #000, 0 0 15px rgba(255,255,255,0.5);
            transition: 0.2s;
        }
        .btn-capture:active { transform: scale(0.95); box-shadow: 0 0 0 4px #000, 0 0 5px rgba(255,255,255,0.2); }

        .instruction-text {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="webcam-container">
        <span style="color: #666;">Mengaktifkan Kamera Portrait...</span>
    </div>

    <div class="controls-panel">
        <div id="label-container" class="label-box label-default">Memuat AI...</div>
        <button class="btn-capture" id="capture-btn" onclick="captureImage()"></button>
        <p class="instruction-text">Posisikan buah di tengah kotak</p>
    </div>
</div>

<script>
    // URL Model Teachable Machine Anda
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/ZkvJoTy22/";
    let model, webcam, maxPredictions, labelContainer;

    // Fungsi Inisialisasi
    async function init() {
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "Memuat AI...";
        
        try {
            // 1. Memuat Model AI
            model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            // 2. Setup Webcam dengan orientasi Portrait
            // Kita minta 480x640. Teachable machine akan mencoba menyesuaikan.
            webcam = new tmImage.Webcam(480, 640, false); 
            
            // Mencoba memaksa kamera belakang
            await webcam.setup({ facingMode: "environment" }); 
            await webcam.play();

            // 3. Masukkan canvas ke kontainer
            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            // Mulai loop prediksi
            window.requestAnimationFrame(loop);
        } catch (e) {
            console.error(e);
            labelContainer.innerHTML = "Kamera Error";
            alert("Gagal mengakses kamera. Pastikan izin diberikan.");
        }
    }

    // Loop Prediksi Real-time
    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    // Fungsi Prediksi
    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        
        // Urutkan berdasarkan probabilitas tertinggi
        prediction.sort((a, b) => b.probability - a.probability);
        
        const bestPrediction = prediction[0];
        const THRESHOLD = 0.85; // Ambang batas kepercayaan

        // Perbarui Label UI
        if (bestPrediction.probability < THRESHOLD) {
            labelContainer.innerHTML = "Cari Objek Sawit...";
            labelContainer.className = "label-box label-default";
        } else {
            const labelLower = bestPrediction.className.toLowerCase();
            const confidencePercent = (bestPrediction.probability * 100).toFixed(0);
            labelContainer.innerHTML = `${bestPrediction.className} (${confidencePercent}%)`;
            
            // Logika Warna berdasarkan nama class
            if (labelLower.includes("mentah")) {
                labelContainer.className = "label-box label-mentah";
            } else if (labelLower.includes("matang")) {
                labelContainer.className = "label-box label-matang";
            } else {
                labelContainer.className = "label-box label-default";
            }
        }
    }

    // Fungsi Ambil Gambar (Watermark Sederhana)
    function captureImage() {
        const bestPrediction = labelContainer.innerText;
        const dataUrl = webcam.canvas.toDataURL("image/png");
        
        // Di sini Anda bisa menambahkan logika untuk menyimpan atau mengunggah dataUrl ini.
        // Untuk contoh ini, kita hanya akan memicu unduhan.
        const link = document.createElement('a');
        link.download = `Sawit_${bestPrediction.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_${new Date().getTime()}.png`;
        link.href = dataUrl;
        link.click();
    }

    // Jalankan init setelah halaman dimuat
    window.addEventListener("load", init);
</script>
</body>
</html>
