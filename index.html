<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sawit AI Compact Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        :root { --accent: #1a73e8; --dark: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            height: 100%; width: 100%; background: var(--dark); 
            overflow: hidden; font-family: -apple-system, sans-serif;
        }

        .app-container {
            height: 100dvh; display: flex; flex-direction: column;
            align-items: center; background: #000;
        }

        /* Top Header */
        .header {
            width: 100%; padding: 15px; text-align: center;
            background: #1a1a1a; border-bottom: 1px solid #333;
        }

        /* Camera Box - Area ini yang kita buat pas dengan rasio 3:4 atau 1:1 */
        #webcam-container { 
            width: 100%; 
            max-width: 450px; /* Lebar maksimal HP */
            aspect-ratio: 1 / 1; /* Kita buat kotak sempurna agar fokus */
            background: #000;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        canvas { 
            width: 100% !important; 
            height: 100% !important; 
            object-fit: cover; /* Menghilangkan hitam di dalam kotak kamera */
        }

        /* Panel Kontrol langsung menempel di bawah kamera */
        .controls-panel {
            flex: 1; width: 100%; max-width: 450px;
            background: #1a1a1a; /* Warna panel beda sedikit agar tegas */
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 20px; padding: 20px;
            border-radius: 25px 25px 0 0; /* Memberi kesan modern */
            margin-top: -20px; /* Membuat panel sedikit menumpuk ke kamera agar compact */
            z-index: 5;
        }

        .label-status { 
            width: 100%; padding: 15px; border-radius: 12px;
            font-size: 16px; font-weight: bold; text-align: center;
            background: #282828; color: white;
            border: 1px solid #444; transition: 0.3s;
        }
        .label-mentah { background: #8b0000 !important; border-color: #ff5252; }
        .label-matang { background: #006400 !important; border-color: #66bb6a; }

        .btn-capture-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .btn-capture { 
            width: 80px; height: 80px; background: white; 
            border: 6px solid #333; border-radius: 50%; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn-inner { width: 60px; height: 60px; border: 2px solid #000; border-radius: 50%; }

        /* Preview Overlay */
        #preview-overlay {
            display: none; position: fixed; inset: 0; background: #000; z-index: 100;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #preview-canvas { width: 90%; max-height: 70%; border-radius: 12px; object-fit: contain; }
        .preview-footer { width: 100%; padding: 30px; display: flex; gap: 15px; }
        .btn-p { flex: 1; padding: 18px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h3 style="color: #eee; font-size: 14px; letter-spacing: 1px;">SCANNER SAWIT v3.0</h3>
    </div>

    <div id="webcam-container"></div>

    <div class="controls-panel">
        <div id="label-container" class="label-status">MENGHUBUNGKAN...</div>
        
        <div class="btn-capture-wrapper">
            <button class="btn-capture" onclick="captureImage()">
                <div class="btn-inner"></div>
            </button>
            <p style="color: #888; font-size: 12px;">Ketuk untuk ambil gambar</p>
        </div>
        
        <button onclick="location.reload()" style="background:none; border:none; color:#555; font-size: 12px; text-decoration: underline;">Reset Kamera</button>
    </div>
</div>

<div id="preview-overlay">
    <canvas id="preview-canvas"></canvas>
    <div class="preview-footer">
        <button class="btn-p" onclick="closePreview()" style="background:#333; color:white;">ULANGI</button>
        <button class="btn-p" onclick="saveImage()" style="background:var(--accent); color:white;">SIMPAN</button>
    </div>
</div>

<script>
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/ZkvJoTy22/";
    let model, webcam, labelContainer, isPaused = false;

    async function init() {
        labelContainer = document.getElementById("label-container");
        try {
            model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
            
            // Kita gunakan rasio kotak (400x400)
            webcam = new tmImage.Webcam(400, 400, false); 
            await webcam.setup({ facingMode: "environment" }); 
            await webcam.play();
            
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            runAI();
        } catch (e) { alert("Akses kamera ditolak/error"); }
    }

    async function runAI() {
        if (!isPaused) {
            webcam.update();
            await predict();
            setTimeout(() => requestAnimationFrame(runAI), 100);
        }
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        prediction.sort((a, b) => b.probability - a.probability);
        const res = prediction[0];

        if (res.probability > 0.8) {
            labelContainer.innerHTML = `${res.className.toUpperCase()} (${(res.probability * 100).toFixed(0)}%)`;
            if (res.className.toLowerCase().includes("mentah")) {
                labelContainer.className = "label-status label-mentah";
            } else {
                labelContainer.className = "label-status label-matang";
            }
        } else {
            labelContainer.innerHTML = "MENCARI OBJEK...";
            labelContainer.className = "label-status";
        }
    }

    function captureImage() {
        isPaused = true;
        const canvas = document.getElementById("preview-canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = webcam.canvas.width;
        canvas.height = webcam.canvas.height;
        ctx.drawImage(webcam.canvas, 0, 0);
        
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.font = "bold 16px Arial";
        ctx.fillText(labelContainer.innerText, canvas.width/2, canvas.height - 20);

        document.getElementById("preview-overlay").style.display = "flex";
    }

    function closePreview() {
        document.getElementById("preview-overlay").style.display = "none";
        isPaused = false;
        runAI();
    }

    function saveImage() {
        const link = document.createElement('a');
        link.download = `Sawit_${Date.now()}.png`;
        link.href = document.getElementById("preview-canvas").toDataURL();
        link.click();
    }

    window.onload = init;
</script>
</body>
</html>
