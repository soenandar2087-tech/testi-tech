<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Detektor Buah Sawit (Portrait)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #121212; /* Background gelap agar kamera menonjol */
            color: white;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Mencegah scroll pada body utama */
            display: flex;
            justify-content: center;
        }

        /* Container utama memenuhi layar mobile */
        .app-container {
            width: 100%;
            max-width: 500px; /* Batasan untuk tablet, full di HP */
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* --- Halaman Depan / Login --- */
        #form-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            background: #fff;
            color: #333;
        }
        #form-container h2 { color: #1a73e8; margin-bottom: 15px; font-size: 2em; }
        #form-container p { margin-bottom: 40px; color: #666; font-size: 1.1em; line-height: 1.4; }
        
        .btn-masuk { 
            width: 100%; 
            padding: 20px; 
            background: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-size: 1.3em; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 4px 10px rgba(26,115,232,0.3);
            transition: 0.3s; 
        }
        .btn-masuk:active { background: #1557b0; transform: scale(0.97); }

        /* --- Area Kamera (Portrait Mode) --- */
        #camera-container { 
            display: none; 
            flex: 1;
            flex-direction: column;
            height: 100%;
        }

        /* Tombol kembali melayang di atas kamera */
        .btn-logout { 
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 8px 15px; 
            background: rgba(0,0,0,0.5); 
            color: white; 
            border: 1px solid rgba(255,255,255,0.3); 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold;
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        /* Area Webcam: Memenuhi sisa layar */
        #webcam-container { 
            flex: 1; /* Mengambil semua ruang vertikal yang tersedia */
            background: #000; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
        }
        
        /* Memastikan canvas webcam memenuhi container secara portrait */
        #webcam-container canvas {
            height: 100% !important;
            width: auto !important;
            /* Jika rasio HP sangat tinggi, bagian samping mungkin terpotong, 
               tapi objek tengah tetap fokus */
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        /* --- UI Controls di Bagian Bawah (Mudah dijangkau jempol) --- */
        .controls-panel {
            background: #1e1e1e;
            padding: 15px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
            z-index: 5;
        }

        .label-box { 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 15px;
            font-size: 1.2em; 
            font-weight: bold; 
            text-align: center;
            min-height: 55px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .label-default { background: #333; color: #bbb; border: 2px dashed #555; }
        .label-mentah { background: #852020; color: #ffcccc; border: 2px solid #d32f2f; }
        .label-matang { background: #1b5e20; color: #c8e6c9; border: 2px solid #2e7d32; }

        .action-btn { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.1em; 
            margin-top: 5px;
        }
        .btn-capture { background: #fff; color: #333; display: none; }
        .btn-capture:active { background: #ddd; }

        /* --- Preview Hasil (Overlay Fullscreen) --- */
        #preview-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 20;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-y: auto; /* Bisa di scroll jika watermark panjang */
        }

        #preview-container { 
            width: 100%;
            max-width: 400px; /* Batasan agar tidak terlalu besar di tablet portrait */
            margin: auto; /* Tengah vertikal */
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); 
            border: 3px solid #fff;
        }
        
        #preview-canvas { 
            width: 100% !important; 
            height: auto !important; 
            display: block;
        }

        .preview-actions {
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        
        .btn-save { background: #17a2b8; color: white; flex: 1; }
        .btn-close-preview { background: #6c757d; color: white; flex: 1; }

        /* Animation */
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="form-container" class="fade-in">
        <div style="font-size: 5em; margin-bottom: 20px;">🌴</div>
        <h2>Sortasi Sawit AI</h2>
        <p>Aplikasi deteksi kematangan buah sawit real-time. Gunakan di area terang untuk hasil terbaik.</p>
        <button class="btn-masuk" id="btn-submit" onclick="masukDanMulai()">📸 BUKA KAMERA</button>
    </div>

    <div id="camera-container">
        <button class="btn-logout" onclick="logout()">⬅️ Keluar</button>

        <div id="webcam-container">
            <span style="color: #888;">Mengaktifkan Kamera Portrait...</span>
        </div>

        <div class="controls-panel">
            <div id="label-container" class="label-box label-default">Memuat AI...</div>
            <button class="action-btn btn-capture" id="capture-btn" onclick="captureImage()">📸 Ambil Gambar</button>
        </div>
    </div>
</div>

<div id="preview-overlay" class="fade-in">
    <div id="preview-container">
        <canvas id="preview-canvas" width="480" height="640"></canvas>
    </div>
    <div class="preview-actions">
        <button class="action-btn btn-close-preview" onclick="closePreview()">🔄 Ulangi</button>
        <button class="action-btn btn-save" onclick="saveImage()">💾 Simpan Foto</button>
    </div>
</div>

<script>
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/ZkvJoTy22/";
    let model, webcam, maxPredictions, previewCtx;
    let currentLabel = "", currentProb = 0;

    // Set ukuran target portrait untuk pengambilan gambar
    const CAPTURE_W = 480;
    const CAPTURE_H = 640;

    async function masukDanMulai() {
        const btn = document.getElementById("btn-submit");
        btn.disabled = true;
        btn.innerHTML = "⏳ Memuat AI...";

        // Fullscreen mode untuk pengalaman app mobile yang lebih baik
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(() => {});
        }

        await initAI();
    }

    async function initAI() {
        try {
            model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            // Setup Webcam dengan aspect ratio Portrait.
            // Di TM Image, width > height dianggap landscape, height > width portrait.
            // Kita minta 480x640. Teachable machine akan mencoba menyesuaikan.
            webcam = new tmImage.Webcam(CAPTURE_W, CAPTURE_H, false); 
            
            // Mencoba memaksa kamera belakang
            await webcam.setup({ facingMode: "environment" }); 
            await webcam.play();

            // Ganti screen
            document.getElementById("form-container").style.display = "none";
            document.getElementById("camera-container").style.display = "flex";

            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            // Munculkan tombol capture
            document.getElementById("capture-btn").style.display = "block";
            
            // Persiapkan canvas preview
            previewCtx = document.getElementById("preview-canvas").getContext("2d");
            
            window.requestAnimationFrame(loop);
        } catch (e) {
            console.error(e);
            alert("Gagal mengakses kamera. Pastikan izin diberikan dan gunakan HTTPS.");
            logout();
        }
    }

    function logout() {
        if (document.exitFullscreen) { document.exitFullscreen().catch(() => {}); }
        location.reload();
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        let bestLabel = "";
        let highestProb = 0;

        for (let i = 0; i < maxPredictions; i++) {
            if (prediction[i].probability > highestProb) {
                highestProb = prediction[i].probability;
                bestLabel = prediction[i].className;
            }
        }

        const lb = document.getElementById("label-container");
        const THRESHOLD = 0.85; // Ambang batas kepercayaan

        if (highestProb < THRESHOLD) {
            currentLabel = "Cari Objek";
            currentProb = highestProb;
            lb.innerHTML = "🔍 Mengamati...";
            lb.className = "label-box label-default";
        } else {
            currentLabel = bestLabel;
            currentProb = highestProb;
            lb.innerHTML = `${bestLabel} (${(highestProb * 100).toFixed(0)}%)`;
            
            // Logika Warna berdasarkan nama class di Teachable Machine
            const labelLower = bestLabel.toLowerCase();
            if (labelLower.includes("mentah")) {
                lb.className = "label-box label-mentah";
            } else if (labelLower.includes("matang") || labelLower.includes("masak")) {
                lb.className = "label-box label-matang";
            } else {
                lb.className = "label-box label-default";
            }
        }
    }

    function captureImage() {
        // Hentikan loop prediksi sebentar agar tidak berat
        // webcam.pause(); 

        // Gambar ulang dari webcam canvas ke preview canvas (Portrait 480x640)
        previewCtx.drawImage(webcam.canvas, 0, 0, CAPTURE_W, CAPTURE_H);
        
        // --- Watermark Overlay Style Mobile ---
        const mwH = 100; // Tinggi area watermark
        previewCtx.fillStyle = "rgba(0, 0, 0, 0.7)";
        previewCtx.fillRect(0, CAPTURE_H - mwH, CAPTURE_W, mwH); 

        previewCtx.fillStyle = "white";
        previewCtx.textAlign = "left";
        
        // Label Hasil Besar
        previewCtx.font = "bold 32px Arial";
        previewCtx.fillText(currentLabel.toUpperCase(), 20, CAPTURE_H - 60);
        
        // Detail Kecil
        const akurasi = (currentProb * 100).toFixed(1) + "%";
        const tgl = new Date().toLocaleString('id-ID', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
        
        previewCtx.font = "18px Arial";
        previewCtx.fillStyle = "#ccc";
        previewCtx.fillText(`Akurasi: ${akurasi} | ${tgl}`, 20, CAPTURE_H - 25);
        
        // Tampilkan Overlay Preview
        document.getElementById("preview-overlay").style.display = "flex";
    }

    function closePreview() {
        document.getElementById("preview-overlay").style.display = "none";
        // webcam.play(); // Lanjutkan prediksi
    }

    function saveImage() {
        const link = document.createElement('a');
        const timeStamp = new Date().getTime();
        link.download = `Sawit_${currentLabel.replace(" ","_")}_${timeStamp}.png`;
        link.href = document.getElementById("preview-canvas").toDataURL("image/png");
        link.click();
    }
</script>
</body>
</html>
