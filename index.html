<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sortasi Sawit AI - Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        .app-container { height: 100dvh; display: flex; flex-direction: column; position: relative; }

        #webcam-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 1; display: flex; align-items: center; justify-content: center; background: #222;
        }
        
        canvas { width: 100% !important; height: 100% !important; object-fit: cover; }

        .ui-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; 
            padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9));
            z-index: 5; display: flex; flex-direction: column; gap: 10px;
        }

        .label-box { 
            padding: 15px; border-radius: 12px; font-size: 1.1em; font-weight: bold; 
            text-align: center; color: white; background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-capture { 
            width: 100%; padding: 18px; background: white; color: black; 
            border: none; border-radius: 12px; font-weight: bold; font-size: 1em;
        }

        /* Status Loading & Error */
        #status-overlay {
            position: fixed; inset: 0; background: white; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center;
        }

        .btn-start {
            width: 100%; max-width: 300px; padding: 15px; background: #1a73e8;
            color: white; border: none; border-radius: 10px; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="status-overlay">
    <h2 id="status-title">🌴 Sortasi Sawit AI</h2>
    <p id="status-msg" style="margin: 15px 0 25px; color: #666;">Klik tombol di bawah untuk mengaktifkan kamera.</p>
    <button class="btn-start" id="main-btn" onclick="startProcess()">BUKA KAMERA</button>
</div>

<div class="app-container">
    <div id="webcam-container"></div>
    <div class="ui-overlay">
        <div id="label-container" class="label-box">Menunggu Kamera...</div>
        <button class="btn-capture" onclick="takePhoto()">📸 AMBIL GAMBAR</button>
    </div>
</div>

<script>
    // GANTI URL INI JIKA MODEL ANDA BERBEDA
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/ZkvJoTy22/";
    
    let model, webcam, labelContainer;
    let isModelLoaded = false;

    async function startProcess() {
        const btn = document.getElementById('main-btn');
        const msg = document.getElementById('status-msg');
        
        btn.disabled = true;
        btn.style.opacity = "0.5";
        msg.innerText = "1. Memuat Model AI... (Tunggu sebentar)";

        try {
            // 1. Load Model
            model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
            isModelLoaded = true;
            msg.innerText = "2. Meminta Izin Kamera...";

            // 2. Setup Webcam
            // Menggunakan resolusi lebih rendah untuk kompatibilitas HP lama
            webcam = new tmImage.Webcam(innerWidth, innerHeight, false); 
            
            // Mencoba akses kamera belakang secara eksplisit
            await webcam.setup({ facingMode: "environment" }); 
            
            msg.innerText = "3. Memulai Aliran Video...";
            await webcam.play();

            // 3. Masuk ke App
            document.getElementById('status-overlay').style.display = 'none';
            document.getElementById('webcam-container').appendChild(webcam.canvas);
            labelContainer = document.getElementById('label-container');
            
            runAI();
        } catch (err) {
            console.error(err);
            btn.disabled = false;
            btn.style.opacity = "1";
            msg.style.color = "red";
            
            if (location.protocol !== 'https:') {
                msg.innerText = "ERROR: Kamera hanya berfungsi di protokol HTTPS. Gunakan GitHub Pages atau koneksi aman.";
            } else {
                msg.innerText = "ERROR: Gagal akses kamera. Pastikan izin diberikan. Detail: " + err.message;
            }
        }
    }

    async function runAI() {
        webcam.update();
        await predict();
        // Jeda 100ms agar ringan
        setTimeout(() => {
            requestAnimationFrame(runAI);
        }, 100);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        prediction.sort((a, b) => b.probability - a.probability);

        const res = prediction[0];
        if (res.probability > 0.8) {
            labelContainer.innerText = `${res.className} (${(res.probability * 100).toFixed(0)}%)`;
            labelContainer.style.background = res.className.toLowerCase().includes("mentah") ? "#d32f2f" : "#2e7d32";
        } else {
            labelContainer.innerText = "🔍 Mencari Objek...";
            labelContainer.style.background = "rgba(0,0,0,0.5)";
        }
    }

    function takePhoto() {
        const dataUrl = webcam.canvas.toDataURL("image/png");
        const link = document.createElement('a');
        link.download = `Sawit_${Date.now()}.png`;
        link.href = dataUrl;
        link.click();
    }
</script>
</body>
</html>
